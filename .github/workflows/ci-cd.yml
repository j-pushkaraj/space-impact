name: 🚀 Space Impact CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      # 📥 Checkout repository
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ⚙️ Setup GitHub Pages
      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v4

      # 📦 Prepare build folder (FIXED)
      - name: 📦 Prepare Build
        run: |
          mkdir dist
          rsync -av \
            --exclude=dist \
            --exclude=.git \
            --exclude=.github \
            ./ dist/

      # 📤 Upload artifact
      - name: 📤 Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      # 🚀 Deploy to GitHub Pages
      - name: 🚀 Deploy
        uses: actions/deploy-pages@v4
